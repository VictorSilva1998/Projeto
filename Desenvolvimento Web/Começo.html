<!--O cabeçalho abaixo pode ser feito mais rapidamente apenas digitando: "!" e apertando ENTER em seguida-->

<!DOCTYPE html>
<html lang = "pt-br"> <!--O lang = "pt-br" é colocado depois do html para definir o idioma como português brasileiro-->

    <head>
        <title>
            Página do Victor
        </title>

        <link rel = "shortcut icon" href = "Sword.png"> <!--É assim que se coloca o icone pequeno que fica na aba ao lado esquerdo do nome da página-->

        <meta charset="UTF-8"> <!--Corrige o problema de acentos causando erros na página-->

        <meta http-equiv = "refresh" content = "60"> <!--Permite colocar um timer para recarregar automáticamente a página-->

        <a href = "https://www.google.com/?hl=pt_BR"> Visite o Google </a> <!--Permite colocar um site para redirecionar a página-->

        <h1> Cabeçalho 1 </h1> <!--Escreve um cabeçalho para a página-->
        <h2> Cabeçalho 2 </h2>
        <h3> Cabeçalho 3 </h3>

        <p title="Texto Exemplo"> <!--A função <p> adiciona um texto a página, digitar: Lorem, cria um texto aleatório--> <!--Tags para Negrito:<b>, Itálico:<i>, Sublinhado:<u> e Tachado:<s>-->
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Facere dolore fuga veniam ea eos aliquam, magni iusto quos sed laborum autem velit asperiores, repellat atque perspiciatis possimus hic molestias cumque.
            <!--O elemento HTML quebra-de-linha <br> produz uma quebra de linha em um texto (carriage-return)-->
        </p> <!--A função <mark> define o texto que deve ser marcado ou destacado, <small> define um texto menor, <sub> define um texto subscrito e <sup> define um texto sobrescrito-->
        
        <hr> This is heading 1 </hr>
        <!--A tag <img> cria um espaço de retenção para a imagem referenciada, deve ser refencida da seguinte forma: <img src="imagem.jpg" alt="Imagem", alt especifica um texto alternativo para a imagem, pode também definir a largura=width e a altura=height da imagem.-->
        </head>

    <body>
    </body>

</html>
